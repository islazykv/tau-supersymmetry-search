stages:
  preprocess:
    cmd: uv run python run.py stage=preprocess
    deps:
      - run.py
      - src/pipelines/preprocess.py
      - src/processing/
      - configs/
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/samples/

  feature_engineer:
    cmd: uv run python run.py stage=feature_engineer
    deps:
      - run.py
      - src/pipelines/feature_engineer.py
      - src/processing/
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/samples/
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/data.parquet

  eda:
    cmd: uv run python run.py stage=eda
    deps:
      - run.py
      - src/pipelines/eda.py
      - src/eda/
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/eda/

  train_bdt:
    cmd: uv run python run.py stage=train
    deps:
      - run.py
      - src/pipelines/train_bdt.py
      - src/models/
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/models/bdt.ubj
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/bdt_predictions.parquet
    plots:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/bdt/:
          cache: false

  evaluate_bdt:
    cmd: uv run python run.py stage=evaluate
    deps:
      - run.py
      - src/pipelines/evaluate_bdt.py
      - src/models/evaluation.py
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/bdt_predictions.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/models/bdt.ubj
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/bdt_evaluation/
    metrics:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/metrics/bdt_metrics.json:
          cache: false

  train_dnn:
    cmd: uv run python run.py stage=train model=dnn
    deps:
      - run.py
      - src/pipelines/train_dnn.py
      - src/models/
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/models/dnn.pt
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/dnn_predictions.parquet
    plots:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/dnn/:
          cache: false

  evaluate_dnn:
    cmd: uv run python run.py stage=evaluate model=dnn
    deps:
      - run.py
      - src/pipelines/evaluate_dnn.py
      - src/models/evaluation.py
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/dnn_predictions.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/models/dnn.pt
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/dnn_evaluation/
    metrics:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/metrics/dnn_metrics.json:
          cache: false

  regions:
    cmd: uv run python run.py stage=regions
    deps:
      - run.py
      - src/pipelines/regions.py
      - src/regions/
      - configs/
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/mc.parquet
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/dataframes/bdt_predictions.parquet
    outs:
      - data/processed/ML/25.2.28/Run2/Preselection/1_tau/plots/ml_regions/
